<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Arkify - Built with Claude 4.7. Data visualization infographic.">
    <meta property="og:image" content="https://arkify.app/arkify-v4.png">
    <title>Arkify - Built with Claude 4.7</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0F0F1E;
            color: #00D9FF;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00D9FF, #FF0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-align: center;
        }
        .container { max-width: 1200px; width: 100%; }
        .infographic {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 217, 255, 0.2);
        }
        .footer {
            margin-top: 2rem;
            text-align: center;
            color: #8E8E93;
        }
        a { color: #00D9FF; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>BUILT WITH CLAUDE 4.7</h1>
    <div class="container">
        <img src="arkify-v4.png" alt="Arkify Data Visualization" class="infographic">
    </div>
    <div class="footer">
        <p>Your mistakes ARE your research | <a href="https://github.com/aaaalabs/arkify">GitHub</a></p>
    </div>
</body>
</html>
