<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="description" content="Arkify - This image shows the decisions that created it. Meta-recursive data visualization.">
    <meta property="og:image" content="https://arkify.app/arkify-v4.png">
    <title>Arkify - ∞ Meta-Recursion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            scroll-behavior: smooth;
            height: 100%;

            background: #0F0F1E;
            color: #00D9FF;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 2rem;
            padding-bottom: 6rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00D9FF, #FF0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 auto 0.5rem auto;
            text-align: center;
            max-width: 1200px;
        }

            font-size: 1.1rem;

        }
        .infographic {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 217, 255, 0.2);
        }
        .footer {
            margin: 2rem auto 0 auto;
            text-align: center;
            color: #8E8E93;
            font-size: 0.9rem;

        }

    <h1>ARKIFY</h1>
