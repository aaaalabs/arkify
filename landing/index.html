<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Arkify - Built with Claude 4.7. Retro-futuristic terminal aesthetic showcasing meta-recursive thought archaeology.">
    <meta property="og:image" content="https://arkify.app/arkify-v3-terminal.png">
    <meta property="og:title" content="Arkify - Built with Claude 4.7">
    <meta property="og:description" content="Your mistakes ARE your research. Meta-recursion achieved.">
    <title>Arkify - Built with Claude 4.7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #00FF41;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .terminal-header {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.5; }
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .infographic {
            width: 100%;
            height: auto;
            border: 2px solid #00FF41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            image-rendering: crisp-edges;
        }

        .terminal-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: #00AA2A;
        }

        .cursor {
            animation: blink 1s infinite;
        }

        a {
            color: #00FF41;
            text-decoration: none;
            border-bottom: 1px dotted #00FF41;
        }

        a:hover {
            background: #00FF41;
            color: #000;
        }

        @media (max-width: 600px) {
            .terminal-header {
                font-size: 1rem;
            }

            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="terminal-header">
        >_ ARKIFY.ANALYZE <span class="cursor">█</span>
    </div>

    <div class="container">
        <img src="arkify-v3-terminal.png"
             alt="Arkify Meta-Recursion Infographic - Built with Claude 4.7"
             class="infographic">
    </div>

    <div class="terminal-footer">
        <p>> THOUGHT ARCHAEOLOGY SYSTEM v4.7</p>
        <p>> ∞ META-RECURSION ACHIEVED</p>
        <p style="margin-top: 1rem;">
            Built with <a href="https://claude.ai" target="_blank">Claude 4.7</a> |
            <a href="https://github.com/aaaalabs/arkify" target="_blank">GitHub</a>
        </p>
        <p style="margin-top: 0.5rem; font-size: 0.8rem;">
            > Your mistakes ARE your research <span class="cursor">█</span>
        </p>
    </div>
</body>
</html>
