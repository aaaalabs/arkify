    # Attempt 3: Enforce no mock data
    attempt3_commit: "2729f2e"
    attempt3_approach: "Remove mock data fallbacks"
    attempt3_result: "SUCCESS - Only real icons shown"
    attempt3_date: "Oct 22, 12:16"
    attempt3_reason: "Per user: 'data HAS to be factual'"

    learning: "4 commits from purple boxes to real icons"

  # DECISION 2: Text Overflow Fix (REAL git commits)
  decision_text_overflow:
    name: "Fix Text Overflows"

    # Problem identified
    problem_commit: "073f9c0"
    problem: "Text truncation, overlaps in panels"
    problem_date: "Oct 22, 12:30"

    # Solution approach
    solution_approach: "Line breaks instead of truncation"
    solution_changes:
      - "_get_wrapped_lines() helper added"
      - "Challenges start AFTER learning text"
      - "Line height: 30px → 24px (8px grid)"
    solution_result: "SUCCESS - Zero overlaps, zero truncation"

    learning: "User said: 'do linebreaks instead'. One commit fix."

