  # DECISION 4: The Mock Data Mistake (REAL - this conversation)
  decision_mock_data_fail:
    name: "NO MOCK DATA Policy"

    # The mistake
    mistake_commit: "bd87332"
    mistake_approach: "Created Phase 2 YAML with invented data"
    mistake_content:
      - "attempts: ['Try 1', 'Try 2', 'Try 3']"
      - "time: '30min', '1h', '2h'"
      - "Made up decision stories"
    mistake_result: "FAIL - User caught it immediately"
    mistake_time: "Oct 26, 05:30"

    # The correction
    user_feedback: "we never use mock data but only real data extracted from our logs, reasonings, and git comments"
    user_instruction: "hammer this into your claude.md memory"

    # The fix
    fix_commit: "245b14a"
    fix_approach: "Extract REAL data from git log"
    fix_changes:
      - "All commits now have real hashes"
      - "All timestamps from git show"
      - "All changes from git diff --stat"
      - "Extended CLAUDE.md with enforcement rules"
    fix_result: "SUCCESS - 100% traceable data"
    fix_time: "Oct 26, 05:45"

    # The meta-insight
    meta_learning: "The mistake itself is a decision path to visualize"
    reflection: "Arkify documents Arkify documenting Arkify. Infinite self-reflection."

  # Meta: This YAML itself uses NO MOCK DATA (after correction)
  meta:
    data_source: "git log --oneline --all"
    commit_range: "69735cf...245b14a"
    commits_analyzed: 28
    real_data_only: true
    mistakes_documented: 1
    corrections_made: 1

  learning: "Failures are research. Mistakes are data. The error is the experiment."

